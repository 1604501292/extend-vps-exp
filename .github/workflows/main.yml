on:
  schedule:
    - cron: '0 1 * * *'  # 建议改成 1，对应北京时间早上 9 点
  workflow_dispatch:     # 保留这个，方便以后你随时手动点按钮测试

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: sudo apt-get -qq update && sudo apt-get -yqq install --no-install-recommends ffmpeg fonts-noto-cjk
      - run: yarn add puppeteer
      - run: node main.mjs
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
      - uses: actions/upload-artifact@v4
        with:
          path: recording.webm
      - name: Send Telegram Notification with Video
        if: always()
        run: |
          # 根据执行结果定义要发送的文本内容
          if [ "${{ job.status }}" == "success" ]; then
            TEXT=$(printf "🎉 \`${{ secrets.EMAIL }}\`\n✅ *续期动作执行成功！*\n_注：操作录像见上方视频，具体到期日请登录查看。_")
          else
            TEXT=$(printf "❌ \`${{ secrets.EMAIL }}\`\n⚠️ *自动续期失败！*\n_请查看上方报错录像寻找原因。_")
          fi
          
          # 判断是否存在视频文件
          if [ -f "recording.webm" ]; then
            # 发送视频文件 + 文本配文 + 底部按钮
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument" \
              -F "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F "caption=${TEXT}" \
              -F "parse_mode=Markdown" \
              -F "document=@recording.webm" \
              -F 'reply_markup={"inline_keyboard": [[{"text": "🔗 打开 XServer 登录页", "url": "https://secure.xserver.ne.jp/xapanel/login/xvps/"}]]}'
          else
            # 如果没找到视频文件（比如依赖安装阶段就报错了），则降级只发文本
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d "text=${TEXT}" \
              -d "parse_mode=Markdown" \
              -d 'reply_markup={"inline_keyboard": [[{"text": "🔗 打开 XServer 登录页", "url": "https://secure.xserver.ne.jp/xapanel/login/xvps/"}]]}'
          fi
